<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retirement & FIRE Calculator 2025 – Project Your Pension Pot | Tabutility</title>
  <meta name="description" content="Free retirement and FIRE calculator. Project your pension pot, find your Financial Independence number and see how long your savings will last with the 4% rule." />
  <meta name="keywords" content="retirement calculator, FIRE calculator, financial independence, pension pot, 4% rule, retire early, savings projection" />
  <link rel="canonical" href="https://retirement-calculator.tabutility.com/" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-78VZWJ5B1W"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-78VZWJ5B1W');</script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>*{margin:0;padding:0;box-sizing:border-box;}body{background:#f0f4ff;}.site-nav{background:#1a1a2e;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}.site-nav a{color:#a5b4fc;text-decoration:none;font-size:14px;font-family:'Segoe UI',Arial,sans-serif;}.nav-brand{color:#fff;font-weight:700;font-size:16px;font-family:'Segoe UI',Arial,sans-serif;}#ad-top,#ad-bottom{text-align:center;padding:10px;background:#fff;}</style>
</head>
<body>
  <nav class="site-nav"><span class="nav-brand">⚡ Tabutility</span><a href="https://tabutility.com">← All Tools</a></nav>
  <div id="ad-top"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-7039091592734005" data-ad-slot="auto" data-ad-format="horizontal" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div>
  <div id="root"></div>
  <div id="ad-bottom"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-7039091592734005" data-ad-slot="auto" data-ad-format="rectangle" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div>
  <script type="text/babel">
    //<![CDATA[
    const { useState } = React;

    function projectBalance(currentSavings, monthlyContrib, annualReturn, years) {
      const r = annualReturn / 100 / 12;
      if (r === 0) return currentSavings + monthlyContrib * 12 * years;
      const n = years * 12;
      return currentSavings * Math.pow(1 + r, n) + monthlyContrib * (Math.pow(1 + r, n) - 1) / r;
    }

    function yearsToFire(currentSavings, monthlyContrib, annualReturn, fireNumber) {
      for (let y = 1; y <= 60; y++) {
        if (projectBalance(currentSavings, monthlyContrib, annualReturn, y) >= fireNumber) return y;
      }
      return null;
    }

    function RetirementCalculator() {
      const [currency, setCurrency] = useState("gbp");
      const [currentAge, setCurrentAge] = useState("30");
      const [retirementAge, setRetirementAge] = useState("65");
      const [currentSavings, setCurrentSavings] = useState("50000");
      const [monthlyContrib, setMonthlyContrib] = useState("500");
      const [annualReturn, setAnnualReturn] = useState("7");
      const [annualExpenses, setAnnualExpenses] = useState("30000");
      const [withdrawalRate, setWithdrawalRate] = useState("4");
      const [result, setResult] = useState(null);

      const sym = currency === "gbp" ? "£" : "$";
      const fmtC = n => sym + Math.round(n).toLocaleString();
      const pct = n => n.toFixed(1) + "%";

      const calculate = () => {
        const age = parseFloat(currentAge) || 30;
        const retAge = parseFloat(retirementAge) || 65;
        const savings = parseFloat(currentSavings) || 0;
        const contrib = parseFloat(monthlyContrib) || 0;
        const ret = parseFloat(annualReturn) || 7;
        const expenses = parseFloat(annualExpenses) || 30000;
        const wRate = parseFloat(withdrawalRate) || 4;
        const years = Math.max(0, retAge - age);
        const projectedBalance = projectBalance(savings, contrib, ret, years);
        const fireNumber = expenses / (wRate / 100);
        const safeMonthlyWithdrawal = projectedBalance * (wRate / 100) / 12;
        const totalContributions = savings + contrib * 12 * years;
        const totalInterest = projectedBalance - totalContributions;
        const fireYears = yearsToFire(savings, contrib, ret, fireNumber);
        const fireAge = fireYears ? age + fireYears : null;
        const onTrack = projectedBalance >= fireNumber;
        const yearly = [];
        for (let y = 0; y <= years; y += Math.max(1, Math.floor(years / 10))) {
          yearly.push({ year: y, age: age + y, balance: projectBalance(savings, contrib, ret, y) });
        }
        setResult({ projectedBalance, fireNumber, safeMonthlyWithdrawal, totalContributions, totalInterest, fireYears, fireAge, onTrack, years, yearly, wRate });
      };

      const inputStyle = { width: "100%", padding: "12px", border: "2px solid #e0e7ff", borderRadius: 10, fontSize: 16, boxSizing: "border-box", outline: "none" };
      const labelStyle = { display: "block", fontWeight: 600, marginBottom: 6, color: "#333" };

      return (
        <div style={{ fontFamily: "'Segoe UI',Arial,sans-serif", background: "#f0f4ff", minHeight: "100vh", padding: "20px" }}>
          <div style={{ maxWidth: 820, margin: "0 auto" }}>
            <div style={{ textAlign: "center", marginBottom: 32 }}>
              <div style={{ fontSize: 48, marginBottom: 8 }}>🔥</div>
              <h1 style={{ margin: 0, fontSize: 32, fontWeight: 800, color: "#1a1a2e" }}>Retirement / FIRE Calculator</h1>
              <p style={{ margin: "8px 0 0", color: "#555", fontSize: 16 }}>Project your retirement pot and find your Financial Independence number</p>
            </div>
            <div style={{ background: "#fff", borderRadius: 16, padding: 28, boxShadow: "0 4px 24px rgba(0,0,0,0.08)", marginBottom: 24 }}>
              <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
                {[["gbp","£ GBP"],["usd","$ USD"]].map(([v,l]) => (
                  <button key={v} onClick={() => setCurrency(v)} style={{ padding: "8px 20px", borderRadius: 8, border: `2px solid ${currency===v?"#3b5bdb":"#e0e7ff"}`, background: currency===v?"#3b5bdb":"#fff", color: currency===v?"#fff":"#333", fontWeight: 600, cursor: "pointer" }}>{l}</button>
                ))}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 20 }}>
                {[
                  { label: "Current Age", value: currentAge, set: setCurrentAge, suffix: "yrs" },
                  { label: "Target Retirement Age", value: retirementAge, set: setRetirementAge, suffix: "yrs" },
                  { label: `Current Savings (${sym})`, value: currentSavings, set: setCurrentSavings, prefix: sym },
                  { label: `Monthly Contribution (${sym})`, value: monthlyContrib, set: setMonthlyContrib, prefix: sym },
                  { label: "Expected Annual Return (%)", value: annualReturn, set: setAnnualReturn, suffix: "%" },
                  { label: `Annual Expenses in Retirement (${sym})`, value: annualExpenses, set: setAnnualExpenses, prefix: sym },
                  { label: "Safe Withdrawal Rate (%)", value: withdrawalRate, set: setWithdrawalRate, suffix: "%" },
                ].map(({ label, value, set, prefix, suffix }) => (
                  <div key={label}>
                    <label style={labelStyle}>{label}</label>
                    <div style={{ position: "relative" }}>
                      {prefix && <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", color: "#666", fontWeight: 600 }}>{prefix}</span>}
                      <input type="number" value={value} onChange={e => set(e.target.value)} style={{ ...inputStyle, paddingLeft: prefix ? 28 : 12, paddingRight: suffix ? 36 : 12 }} />
                      {suffix && <span style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", color: "#666" }}>{suffix}</span>}
                    </div>
                  </div>
                ))}
              </div>
              <button onClick={calculate} style={{ width: "100%", marginTop: 24, padding: "16px", background: "linear-gradient(135deg, #3b5bdb, #1971c2)", color: "#fff", border: "none", borderRadius: 12, fontSize: 18, fontWeight: 700, cursor: "pointer" }}>Calculate My Retirement</button>
            </div>
            {result && <>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(170px,1fr))", gap: 16, marginBottom: 24 }}>
                {[
                  { label: "Projected Pot", value: fmtC(result.projectedBalance), color: "#3b5bdb", bg: "#eef2ff" },
                  { label: "FIRE Number", value: fmtC(result.fireNumber), color: "#7c3aed", bg: "#faf5ff" },
                  { label: "Safe Monthly Income", value: fmtC(result.safeMonthlyWithdrawal), color: result.onTrack?"#2f9e44":"#e03131", bg: result.onTrack?"#ebfbee":"#fff5f5" },
                  { label: result.fireAge ? "FIRE Age" : "FIRE Age", value: result.fireAge ? `${result.fireAge} yrs` : "60+ yrs", color: "#e67700", bg: "#fff9db" },
                  { label: "Interest Earned", value: fmtC(result.totalInterest), color: "#0369a1", bg: "#e0f2fe" },
                ].map((item,i) => (
                  <div key={i} style={{ background: item.bg, borderRadius: 14, padding: 18, textAlign: "center", border: `2px solid ${item.color}22` }}>
                    <div style={{ fontSize: 22, fontWeight: 800, color: item.color }}>{item.value}</div>
                    <div style={{ fontSize: 12, color: "#555", marginTop: 4, fontWeight: 500 }}>{item.label}</div>
                  </div>
                ))}
              </div>
              <div style={{ background: "#fff", borderRadius: 16, padding: 24, boxShadow: "0 2px 12px rgba(0,0,0,0.06)", marginBottom: 24 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
                  <div style={{ fontSize: 24 }}>{result.onTrack ? "✅" : "⚠️"}</div>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 16, color: result.onTrack?"#2f9e44":"#e03131" }}>{result.onTrack ? "On track for retirement" : "Shortfall projected"}</div>
                    <div style={{ fontSize: 13, color: "#555" }}>{result.onTrack ? `Your projected ${fmtC(result.projectedBalance)} exceeds your FIRE number of ${fmtC(result.fireNumber)}.` : `Your projected ${fmtC(result.projectedBalance)} falls short of ${fmtC(result.fireNumber)}.`}</div>
                  </div>
                </div>
              </div>
              <div style={{ background: "#fff", borderRadius: 16, padding: 24, boxShadow: "0 2px 12px rgba(0,0,0,0.06)", marginBottom: 24 }}>
                <h3 style={{ margin: "0 0 16px", fontSize: 16, fontWeight: 700 }}>📈 Projected Balance Over Time</h3>
                <div style={{ overflowX: "auto" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                    <thead><tr style={{ background: "#eef2ff" }}>{["Age","Year","Projected Balance"].map(h => <th key={h} style={{ padding: "10px 14px", textAlign: "left", fontWeight: 700 }}>{h}</th>)}</tr></thead>
                    <tbody>{result.yearly.map((row,i) => (
                      <tr key={i} style={{ borderBottom: "1px solid #f1f3f5", background: i%2===0?"#fff":"#fafafa" }}>
                        <td style={{ padding: "9px 14px", fontWeight: 600 }}>{row.age}</td>
                        <td style={{ padding: "9px 14px", color: "#888" }}>{row.year}</td>
                        <td style={{ padding: "9px 14px", color: "#3b5bdb", fontWeight: 600 }}>{fmtC(row.balance)}</td>
                      </tr>
                    ))}</tbody>
                  </table>
                </div>
              </div>
              <div style={{ background: "#e0f2fe", border: "1px solid #38bdf8", borderRadius: 12, padding: 16, fontSize: 13, color: "#0369a1" }}>
                <strong>About the 4% rule:</strong> Based on the Trinity Study — a 4% annual withdrawal from a diversified portfolio has historically sustained 30+ years of retirement. For early retirement (FIRE), many use 3–3.5%. Does not account for state pension, tax, or inflation.
              </div>
            </>}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<RetirementCalculator />);
    //]]>
  </script>
</body>
</html>
